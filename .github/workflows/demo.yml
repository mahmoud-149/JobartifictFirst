name: Deploy website
on:
  push:
    branches:
      - master
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Lint code
        run: npm run lint
      - name: Test code
        run: npm run test
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      script-file: ${{ steps.theSharefile.outputs.try-file }}
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Build website
        run: npm run build
      - name: dist-files
        uses: actions/upload-artifact@v4
        with:
          name: dist-file
          path:
            dist
      - name: share the file
        id: theSharefile
        run: find dist/assets/*.js -type f -execdir echo 'try-file={}' >> $GITHUB_OUTPUT ';' 
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        run: echo "Deploying..."
      - name: get output FIle
        run: echo "${{ needs.build.outputs.script-file}}" 
